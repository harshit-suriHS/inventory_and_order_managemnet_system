databases:
  - name: inventory-db
    databaseName: inventory
    user: inventory
    plan: free

services:
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: inventory-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: inventory-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: inventory-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: inventory-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: inventory-db
          property: database
      - key: LOW_STOCK_THRESHOLD
        value: "10"
